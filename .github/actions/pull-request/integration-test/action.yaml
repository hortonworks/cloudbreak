name: 'Integration Test'
description: 'Run integration tests'

runs:
  using: "composite"
  steps:
    - name: integration_test
      shell: bash
      run: |-
        export INTEGRATIONTEST_SUITE_FILES=file:/it/src/main/resources/testsuites/v4/mock/all-in-mock-package.yaml
        export AWS=false
        export INTEGRATIONTEST_UMS_HOST=thunderhead-mock
        export INTEGRATIONTEST_UMS_PORT=8982
        export INTEGRATIONTEST_CDL_HOST=thunderhead-mock
        export INTEGRATIONTEST_CDL_PORT=8982
        export INTEGRATIONTEST_AUTHDISTRIBUTOR_HOST=thunderhead-mock
        export INTEGRATIONTEST_THREADCOUNT=4
        export USE_FEDRAMP_CONTAINERS=false

        make integration-test-steps_integration_test
    - name: integration_test_show_result
      if: ${{ always() }}
      uses: Kitchen/RE-thirdparty-actions/actions/testng-report@main
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN}}
      with:
        fail_if_empty: false
        commit: ${{ github.event.pull_request.head.sha }}
        show_skipped: true
        check_name: 'Integration Test Report'
        report_paths: |
          **/testng-results.xml
    - name: integration_test_compress_results
      if: ${{ always() }}
      shell: bash
      run: |-
        cd integration-test
        make compress-results
    # Upload could be trimmed further with upload-artifact v4's store-only mode (compression-level: 0),
    # but v4 is not supported on our internal GitHub Enterprise Server, so we stay on the vendored v3.
    - name: integration_test_collect_service_artifacts
      uses: cloudbreak/cloudbreak-github-actions/actions/upload-artifact@master
      if: ${{ always() }}
      with:
        name: integration-test-cb-service-logs-artifact
        retention-days: 5
        # Both archives are already gzipped by compress-results.sh.
        # The service logs (cloudbreak/datalake/environment/freeipa/redbeams/...) live inside
        # integcb-logs.tar.gz; the loose gateway/cluster-proxy/thunderhead logs are in gateway-logs.tar.gz.
        path: |
          integration-test/integcb-logs.tar.gz
          integration-test/gateway-logs.tar.gz
    - name: integration_test_collect_test_artifacts
      uses: cloudbreak/cloudbreak-github-actions/actions/upload-artifact@master
      if: ${{ always() }}
      with:
        name: integration-test-suites_log-artifact
        retention-days: 5
        # Already gzipped by compress-results.
        path: |
          integration-test/suites.tar.gz
    - name: integration_test_collect_test_result_artifacts
      uses: cloudbreak/cloudbreak-github-actions/actions/upload-artifact@master
      if: ${{ always() }}
      with:
        name: integration-test-test-output-artifact
        retention-days: 5
        # Already gzipped by compress-results.
        path: |
          integration-test/test-output.tar.gz
    - name: integration_test_collect_test_console_output_artifacts
      uses: cloudbreak/cloudbreak-github-actions/actions/upload-artifact@master
      if: ${{ always() }}
      with:
        name: integration-test-test_console_output-artifact
        retention-days: 5
        # Already gzipped by compress-results.
        path: |
          integration-test/test-console-output.tar.gz
