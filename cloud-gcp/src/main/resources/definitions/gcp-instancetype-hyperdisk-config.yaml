      hyperDiskThroughputMaxCount: 32

    # n4d family
    "[^n4d-(standard|highcpu|highmem)-2$]":
      hyperDiskMaxCount: 4
      hyperDiskBalancedMaxCount: 16
      hyperDiskThroughputMaxCount: 16
    "[^n4d-(standard|highcpu|highmem)-4$]":
      hyperDiskMaxCount: 8
      hyperDiskBalancedMaxCount: 16
      hyperDiskThroughputMaxCount: 16
    "[^n4d-(standard|highcpu|highmem)-8$]":
      hyperDiskMaxCount: 16
      hyperDiskBalancedMaxCount: 16
      hyperDiskThroughputMaxCount: 16
    "[^n4d-(standard|highcpu|highmem)-16$]":
      hyperDiskMaxCount: 32
      hyperDiskBalancedMaxCount: 32
      hyperDiskThroughputMaxCount: 32
    "[^n4d-(standard|highcpu|highmem)-(32|48|64|80|96)$]":
